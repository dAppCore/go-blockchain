name: Test

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - name: Install C dependencies
        run: sudo apt-get update && sudo apt-get install -y gcc g++ libsodium-dev
      - name: Test
        run: CGO_ENABLED=1 go test -v -race ./...
      - name: Vet
        run: go vet ./...
